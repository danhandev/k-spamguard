name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-paths:
    name: Check Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "backend=$(test -f backend/build.gradle && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(test -f frontend/package.json && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: check-paths
    if: needs.check-paths.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Check formatting
        run: cd backend && ./gradlew spotlessCheck --no-daemon
      - name: Run tests
        run: cd backend && ./gradlew test --no-daemon
      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: check-paths
    if: needs.check-paths.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npm run type-check || true
      - name: Build
        run: cd frontend && npm run build

  lint-docs:
    name: Docs Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for TODO/FIXME in docs
        run: grep -rn "TODO\|FIXME" docs/ || true
