name: Feature
description: 새 기능 또는 개선 사항
labels: ["feat"]
body:
  - type: input
    id: summary
    attributes:
      label: 한 줄 요약
      placeholder: "예: Instagram Webhook 중복 수신 멱등성 처리"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 / 목적
      description: 왜 이 기능이 필요한가?

  - type: textarea
    id: acceptance
    attributes:
      label: 인수 조건 (Acceptance Criteria)
      description: 완료 기준을 체크리스트로 작성
      value: |
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 구현 노트 / 참고
      description: 관련 파일, 의존성, 보안 고려사항 등
