spring:
  application:
    name: k-spamguard
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kspamguard?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:kspamguard}
    password: ${DB_PASSWORD:kspamguard}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
